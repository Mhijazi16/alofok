name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + migrations + tests)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: horizon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENVIRONMENT: development
      JWT_SECRET: test-secret
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/horizon_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/horizon_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Black format check
        run: black --check .

      - name: Run migrations (validates the full chain)
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.app.json

      - name: Build
        run: bun run build
