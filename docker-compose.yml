services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # Uploaded images are served directly by Caddy (read-only) instead of being
      # proxied through the API workers — frees the backend and is much faster.
      - static_files:/srv/static:ro
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-horizon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db/${POSTGRES_DB:-horizon}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
    volumes:
      - static_files:/app/static
      - ./etl:/etl
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # python ships in the image (slim has no curl/wget). /health verifies DB
      # connectivity, so an unhealthy mark means the API truly can't serve.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  static_files:
  caddy_data:
  caddy_config:
